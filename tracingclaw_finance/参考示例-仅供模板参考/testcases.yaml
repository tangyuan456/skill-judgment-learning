meta:
  count: 4
  notice: "学生版金融验真测试用例：仅允许 westock-data 与 mx-finance-search，不允许内部链路接口。"

cases:
  - Input: 请核查“腾讯 2024 年营收是 6600 亿元人民币”这句话是否正确。
    ExpectedOutput: |
      - 识别为财报/营收核查
      - 优先调用 westock-data 查询腾讯对应财报口径
      - 必须标注报告期、币种、单位
      - 输出 0/1/2 分真实性评分
    Judge: |
      - 不直接相信用户给出的数字。
      - 不调用任何内部链路接口。
      - 给出可复核的数据来源和修正表述。

  - Input: 帮我验证“贵州茅台今天股价上涨超过 3%”是否属实。
    ExpectedOutput: |
      - 识别为行情核查
      - 使用 westock-data 查询实时/当日行情
      - 标注交易日、更新时间、涨跌幅口径
      - 判断结论是否成立
    Judge: |
      - 必须说明行情数据时间截面。
      - 不用新闻标题替代行情数据。
      - 数据不足时明确说明无法确认。

  - Input: 某研报说“新能源车行业景气度已经反转”，帮我核查这个结论有没有依据。
    ExpectedOutput: |
      - 识别为研报/行业观点核查
      - 使用 mx-finance-search 搜公告、研报、新闻和政策背景
      - 如涉及上市公司数据，再用 westock-data 交叉验证
      - 区分事实、观点和推测
    Judge: |
      - 不把单篇研报观点当事实。
      - 能标注信息来源和时间。
      - 明确说明证据强弱与不确定性。
